# Railway config-as-code: https://docs.railway.app/reference/config-as-code
# Repo root must be this folder (Vari/) so Varibot/ and Vari Listings/ paths work.
#
# Use Docker (official python image) instead of Railpack/mise so builds do not
# download CPython from the mise mirror on every deploy (avoids mirror timeouts).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python3 Varibot/varibot.py --live"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
