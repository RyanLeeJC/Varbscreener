name: Deploy Funding Screener

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: python3 -m pip install -r requirements.txt

      - name: Refresh screener snapshot
        env:
          VR_TOKEN: ${{ secrets.VR_TOKEN }}
          VR_WALLET_ADDRESS: ${{ secrets.VR_WALLET_ADDRESS }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: python3 fundingratecheck.py --write-screener-data funding_screener.data.js

      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html funding_screener.data.js _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
